<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/containers.css">
    <link rel="stylesheet" href="../css/clickables.css">
    <link rel="stylesheet" href="../css/inputs.css">
</head>
<body>

    <div class="c-wrap-container" id="top-level-container">
        <!-- Populated via index.js -->
    </div>
    
    <div class="v-spacer"></div>
    
    <div class="c-wrap-container" id="other-char-container">
        <!-- Populated via index.js -->        
    </div>
    
    <div class="c-top-bar left">
        <div class="btn floating norm-size" title="Login without a character selected">
            Admin
        </div>
        <div class="btn floating norm-size" title="Create a new character" id="new-char-btn">
            New Character
        </div>
        <div class="btn floating norm-size disabled" data-requires-selection title="Delete selected character" id="delete-char-btn">
            Delete Character
        </div>
        <div class="btn floating norm-size disabled" data-requires-selection title="Login with selected character">
            Login
        </div>
    </div>
    <div class="c-top-bar right">
        <svg id="theme-btn" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-btn"><path d="M12 2v2"/><path d="M14.837 16.385a6 6 0 1 1-7.223-7.222c.624-.147.97.66.715 1.248a4 4 0 0 0 5.26 5.259c.589-.255 1.396.09 1.248.715"/><path d="M16 12a4 4 0 0 0-4-4"/><path d="m19 5-1.256 1.256"/><path d="M20 12h2"/></svg>
    </div>
    <div class="modal-overlay" id="new-char-modal">
        <div class="modal">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; width:100%;">
                <span>New Character</span>
                <svg class="icon-btn" id="close-modal-btn" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
            </div>
            <input type="text" id="new-char-name" placeholder="Character name..."/>
            <div style="display:flex; justify-content:flex-end; margin-top:16px;">
                <div class="btn" id="submit-new-char">Create</div>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>

</body>
<script src="../router.js"></script>
<script src="../js/global.js"></script>
<script src="../js/index.js"></script>
</html>
